<!-- Flash messages modal -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="modal fade" id="msgModal" tabindex="-1" role="dialog"
     aria-labelledby="msgModalTitle" aria-modal="true" data-ns-autoshow="1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="msgModalTitle">Night Squirrels</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="mb-0">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('OK') }}</button>
      </div>
    </div>
  </div>
</div>
{% endif %}
{% endwith %}
