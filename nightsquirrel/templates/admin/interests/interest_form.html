{% extends 'base.html' %}
{% block metatags %}<title>{{ _('Admin') }} · {{ _('Interest') }} | Night Squirrels</title>{% endblock %}
{% block ns_container %}ns-container-md{% endblock %}
{% block contents %}

<div class="d-flex justify-content-between align-items-center mt-3 mb-4">
  <h2 class="m-0">{{ _('Edit interest') if row else _('New interest') }}</h2>
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('bl_interests.admin_list') }}">{{ _('Back') }}</a>
</div>

<form method="post" action="{{ action }}">
  <div class="card">
    <div class="card-body row g-3">

      <div class="col-md-6">
        <label class="form-label">{{ _('Italian name') }} <span class="text-danger">*</span></label>
        <input class="form-control" name="uit_name_ita" required
               value="{{ (row.uit_name_ita or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('English name') }} <span class="text-danger">*</span></label>
        <input class="form-control" name="uit_name_eng" required
               value="{{ (row.uit_name_eng or '') if row else '' }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">{{ _('Type') }} <span class="text-muted small">{{ _('(optional classifier, e.g. Science, Humanities…)') }}</span></label>
        <input class="form-control" name="uit_type"
               value="{{ row.uit_type if row and row.uit_type else '' }}">
      </div>

    </div>
  </div>

  <div class="d-flex gap-2 justify-content-end mt-3 mb-4">
    <a class="btn btn-outline-secondary" href="{{ url_for('bl_interests.admin_list') }}">{{ _('Cancel') }}</a>
    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
  </div>
</form>

{% endblock %}
