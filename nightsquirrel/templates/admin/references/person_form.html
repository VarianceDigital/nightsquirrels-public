{% extends 'base.html' %}
{% block metatags %}<title>{{ _('Admin') }} · {{ _('Person') }} | Night Squirrels</title>{% endblock %}
{% block ns_container %}ns-container-md{% endblock %}
{% block contents %}

<div class="d-flex justify-content-between align-items-center mt-3 mb-4">
  <h2 class="m-0">{{ _('Edit Person') if row else _('New Person') }}</h2>
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('bl_references.admin_persons') }}">{{ _('Back') }}</a>
</div>

<form method="post" action="{{ action }}">
  <div class="card">
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label class="form-label">{{ _('Family name') }}</label>
        <input class="form-control" name="per_familyname" value="{{ (row.per_familyname or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('First name') }}</label>
        <input class="form-control" name="per_firstname" value="{{ (row.per_firstname or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Caption (Italian)') }} <span class="text-muted small">{{ _('(short bio or title)') }}</span></label>
        <input class="form-control" name="per_caption_ita" value="{{ (row.per_caption_ita or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Caption (English)') }} <span class="text-muted small">{{ _('(short bio or title)') }}</span></label>
        <input class="form-control" name="per_caption_eng" value="{{ (row.per_caption_eng or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Nobel Prize') }} <span class="text-muted small">{{ _('(e.g. 1921 - Physics)') }}</span></label>
        <input class="form-control" name="per_won_nobel" value="{{ (row.per_won_nobel or '') if row else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Search strings') }} <span class="text-muted small">{{ _('(extra aliases for search)') }}</span></label>
        <input class="form-control" name="per_strings" value="{{ (row.per_strings or '') if row else '' }}">
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3 mb-4">
    <a class="btn btn-outline-secondary" href="{{ url_for('bl_references.admin_persons') }}">{{ _('Cancel') }}</a>
    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
  </div>
</form>
{% endblock %}
